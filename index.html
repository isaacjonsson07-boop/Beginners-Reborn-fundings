<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beginners Reborn — Funding Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"><\/script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg-root:#090909;--bg-primary:#0d0d0d;--bg-secondary:#131313;--bg-card:#171717;--bg-card-hover:#1c1c1c;--bg-input:#0d0d0d;--border:#2a2a2a;--border-light:#222;--border-focus:#3ECF8E;--text-primary:#ededed;--text-secondary:#a1a1a1;--text-muted:#666;--green:#3ECF8E;--green-glow:rgba(62,207,142,0.15);--green-glow-strong:rgba(62,207,142,0.25);--red:#f75f5f;--red-glow:rgba(247,95,95,0.12);--amber:#f0b429;--blue:#3b82f6}
    body{font-family:Inter,-apple-system,sans-serif;background:var(--bg-root);color:var(--text-primary);min-height:100vh;line-height:1.6}
    .app-layout{display:flex;min-height:100vh}
    .sidebar{width:240px;background:var(--bg-primary);border-right:1px solid var(--border);padding:1.5rem 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
    .sidebar-logo{padding:0 1.25rem;margin-bottom:2rem}
    .sidebar-logo .brand{font-family:JetBrains Mono,monospace;font-weight:700;font-size:.95rem;color:var(--green);letter-spacing:-.5px}
    .sidebar-logo .sub{font-size:.7rem;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
    .nav-item{display:flex;align-items:center;gap:.75rem;padding:.6rem 1.25rem;color:var(--text-muted);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;border-left:2px solid transparent;text-decoration:none}
    .nav-item:hover{color:var(--text-secondary);background:rgba(255,255,255,.02)}
    .nav-item.active{color:var(--text-primary);background:rgba(62,207,142,.05);border-left-color:var(--green)}
    .nav-item svg{width:18px;height:18px;opacity:.6}
    .nav-item.active svg{opacity:1;color:var(--green)}
    .content-area{flex:1;margin-left:240px;padding:2rem;max-width:1100px}
    .page-title{font-family:JetBrains Mono,monospace;font-size:1.4rem;font-weight:700;margin-bottom:1.5rem;letter-spacing:-.5px}
    .page{display:none}.page.active{display:block}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:1.5rem}
    .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1.25rem;transition:all .2s}
    .stat-card:hover{border-color:var(--green);box-shadow:0 0 30px var(--green-glow)}
    .stat-label{font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.5rem}
    .stat-value{font-family:JetBrains Mono,monospace;font-size:1.8rem;font-weight:700;line-height:1}
    .stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.blue{color:var(--blue)}.stat-value.amber{color:var(--amber)}
    .stat-sub{font-size:.75rem;color:var(--text-muted);margin-top:.5rem}
    .panel{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1.25rem;margin-bottom:1.5rem}
    .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border-light)}
    .panel-title{font-family:JetBrains Mono,monospace;font-size:.85rem;font-weight:600;letter-spacing:-.3px;color:var(--text-secondary)}
    .btn{font-family:Inter,sans-serif;font-size:.8rem;font-weight:500;padding:.5rem 1rem;border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.4rem}
    .btn-primary{background:var(--green);color:#000;border-color:var(--green);font-weight:600}
    .btn-primary:hover{background:#34b87a;box-shadow:0 0 20px var(--green-glow-strong)}
    .btn-ghost{background:transparent;color:var(--text-secondary)}.btn-ghost:hover{color:var(--text-primary);background:var(--bg-card-hover)}
    .btn-danger{background:transparent;color:var(--red);border-color:transparent}.btn-danger:hover{background:var(--red-glow)}
    .btn-sm{padding:.25rem .5rem;font-size:.75rem}
    .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-bottom:.75rem}
    .form-group{display:flex;flex-direction:column;gap:.3rem}
    .form-group label{font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
    .form-group input,.form-group select,.form-group textarea{background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:Inter,sans-serif;font-size:.85rem;padding:.55rem .75rem;outline:none;transition:border-color .15s}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow)}
    .data-table{width:100%;border-collapse:collapse}
    .data-table th{text-align:left;font-size:.65rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;padding:.65rem .75rem;border-bottom:1px solid var(--border)}
    .data-table td{padding:.65rem .75rem;border-bottom:1px solid var(--border-light);font-size:.85rem}
    .data-table tr:hover td{background:rgba(62,207,142,.02)}
    .data-table .amount{font-family:JetBrains Mono,monospace;font-weight:600;font-size:.9rem}
    .data-table .date{color:var(--text-muted);font-size:.8rem}
    .data-table .actions{display:flex;gap:.25rem}
    .leaderboard-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .5rem;border-radius:6px;transition:background .15s}
    .leaderboard-item:hover{background:rgba(255,255,255,.02)}
    .lb-rank{font-family:JetBrains Mono,monospace;font-weight:700;font-size:.85rem;width:1.75rem;height:1.75rem;display:flex;align-items:center;justify-content:center;border-radius:4px;background:var(--bg-secondary);color:var(--text-muted)}
    .lb-rank.gold{color:#fbbf24;background:rgba(251,191,36,.1)}.lb-rank.silver{color:#94a3b8;background:rgba(148,163,184,.1)}.lb-rank.bronze{color:#d97706;background:rgba(217,119,6,.1)}
    .lb-name{flex:1;font-weight:500;font-size:.9rem}
    .lb-amount{font-family:JetBrains Mono,monospace;font-weight:600;font-size:.9rem;color:var(--green)}
    .chart-container{position:relative;height:260px;margin-top:.5rem}
    .toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:.5rem}
    .toast{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:.6rem 1rem;font-size:.85rem;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:slideIn .3s ease;display:flex;align-items:center;gap:.5rem}
    .toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:1.5rem;width:90%;max-width:500px;transform:scale(.95);transition:transform .15s}
    .modal-overlay.open .modal{transform:scale(1)}
    .modal-title{font-family:JetBrains Mono,monospace;font-size:1rem;font-weight:600;margin-bottom:1rem}
    .modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
    .table-scroll{overflow-x:auto}
    .empty-state{text-align:center;padding:2rem;color:var(--text-muted);font-size:.85rem}
    select option{background:var(--bg-card);color:var(--text-primary)}
    .mobile-header{display:none;background:var(--bg-primary);border-bottom:1px solid var(--border);padding:.75rem 1rem;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:101}
    .mobile-header .brand{font-family:JetBrains Mono,monospace;font-weight:700;font-size:.9rem;color:var(--green)}
    .hamburger{background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:.25rem}
    @media(max-width:768px){.mobile-header{display:flex}.sidebar{transform:translateX(-100%);transition:transform .2s}.sidebar.open{transform:translateX(0)}.content-area{margin-left:0;padding:1rem}.two-col{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}}
    @media(max-width:480px){.stats-grid{grid-template-columns:1fr}}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  </style>
</head>
<body>
<div class="mobile-header"><div class="brand">BR Funding</div><button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button></div>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="brand">BR Funding</div><div class="sub">Manager</div></div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-page="dashboard" onclick="navigate(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a class="nav-item" data-page="donations" onclick="navigate(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Donations</a>
      <a class="nav-item" data-page="expenses" onclick="navigate(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H3v16h18V4zM3 10h18"/></svg>Expenses</a>
      <a class="nav-item" data-page="reports" onclick="navigate(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Reports</a>
    </nav>
  </aside>
  <div class="content-area">
    <section class="page active" id="page-dashboard"><div class="page-title">Dashboard</div><div class="stats-grid" id="dashboard-stats"></div><div class="two-col"><div class="panel"><div class="panel-header"><div class="panel-title">Top Donors</div></div><div id="dashboard-leaderboard"></div></div><div class="panel"><div class="panel-header"><div class="panel-title">Monthly Overview</div></div><div class="chart-container"><canvas id="dashboard-chart"></canvas></div></div></div><div class="panel"><div class="panel-header"><div class="panel-title">Recent Activity</div></div><div class="table-scroll"><table class="data-table" id="dashboard-recent"></table></div></div></section>
    <section class="page" id="page-donations"><div class="page-title">Donations</div><div class="panel"><div class="panel-header"><div class="panel-title">Add Donation</div></div><form id="donation-form"><div class="form-row"><div class="form-group"><label>Donor Name</label><input type="text" id="don-name" required placeholder="e.g. Ewoken"/></div><div class="form-group"><label>Amount (€)</label><input type="number" id="don-amount" step="0.01" min="0.01" required placeholder="10.00"/></div><div class="form-group"><label>Date</label><input type="date" id="don-date" required/></div></div><div class="form-row"><div class="form-group" style="grid-column:1/-1"><label>Notes (optional)</label><input type="text" id="don-notes" placeholder="e.g. VIP whitelist, event entry..."/></div></div><button type="submit" class="btn btn-primary">+ Add Donation</button></form></div><div class="two-col"><div class="panel"><div class="panel-header"><div class="panel-title">All Donations</div></div><div class="table-scroll"><table class="data-table" id="donations-table"></table></div></div><div class="panel"><div class="panel-header"><div class="panel-title">Donor Leaderboard</div></div><div id="donations-leaderboard"></div></div></div></section>
    <section class="page" id="page-expenses"><div class="page-title">Expenses</div><div class="panel"><div class="panel-header"><div class="panel-title">Add Expense</div></div><form id="expense-form"><div class="form-row"><div class="form-group"><label>Description</label><input type="text" id="exp-desc" required placeholder="e.g. Monthly server hosting"/></div><div class="form-group"><label>Amount (€)</label><input type="number" id="exp-amount" step="0.01" min="0.01" required placeholder="25.00"/></div><div class="form-group"><label>Category</label><select id="exp-category"></select></div></div><div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="exp-date" required/></div><div class="form-group"><label>Recurring?</label><select id="exp-recurring"><option value="false">No</option><option value="true">Yes (monthly)</option></select></div><div class="form-group"><label>Notes (optional)</label><input type="text" id="exp-notes" placeholder="Additional details..."/></div></div><button type="submit" class="btn btn-primary">+ Add Expense</button></form></div><div class="panel"><div class="panel-header"><div class="panel-title">All Expenses</div></div><div class="table-scroll"><table class="data-table" id="expenses-table"></table></div></div></section>
    <section class="page" id="page-reports"><div class="page-title">Reports</div><div class="stats-grid" id="report-stats"></div><div class="two-col"><div class="panel"><div class="panel-header"><div class="panel-title">Donations vs Expenses</div></div><div class="chart-container"><canvas id="report-bar-chart"></canvas></div></div><div class="panel"><div class="panel-header"><div class="panel-title">Expense Categories</div></div><div class="chart-container"><canvas id="report-pie-chart"></canvas></div></div></div><div class="panel"><div class="panel-header"><div class="panel-title">Monthly Breakdown</div></div><div class="table-scroll"><table class="data-table" id="report-monthly-table"></table></div></div></section>
  </div>
</div>
<div class="modal-overlay" id="edit-modal"><div class="modal"><div class="modal-title" id="modal-title">Edit</div><form id="modal-form"></form><div class="modal-actions"><button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button><button type="button" class="btn btn-primary" id="modal-save">Save</button></div></div></div>
<div class="modal-overlay" id="confirm-modal"><div class="modal"><div class="modal-title">Confirm Delete</div><p style="color:var(--text-secondary);margin-bottom:.5rem" id="confirm-text">Are you sure?</p><div class="modal-actions"><button type="button" class="btn btn-ghost" onclick="closeConfirm()">Cancel</button><button type="button" class="btn btn-danger" id="confirm-yes" style="border:1px solid var(--red)">Delete</button></div></div></div>
<div class="toast-container" id="toasts"></div>
<script>
const SUPABASE_URL='https://exlzwftgqlbtyytahtml.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4bHp3ZnRncWxidHl5dGFodG1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzk5MDUsImV4cCI6MjA4ODgxNTkwNX0.CgWv2155yXxhKtkVtmvbs-wkL20FP5GaZgi0LP0vkSo';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let donations=[],expenses=[],categories=[];
let dashboardChart=null,reportBarChart=null,reportPieChart=null;
Chart.defaults.color='#666';Chart.defaults.borderColor='rgba(42,42,42,0.5)';Chart.defaults.font.family='Inter';
function navigate(el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('page-'+el.dataset.page).classList.add('active');if(el.dataset.page==='reports')renderReports();document.querySelector('.sidebar').classList.remove('open')}
function toast(msg,type='success'){const el=document.createElement('div');el.className='toast '+type;el.textContent=(type==='success'?'✓ ':'✗ ')+msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),300)},3000)}
function fmt(n){return Number(n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+'€'}
function fmtDate(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}
function todayStr(){return new Date().toISOString().split('T')[0]}
function getMonthKey(d){const dt=new Date(d+'T00:00:00');return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')}
function getMonthLabel(k){const[y,m]=k.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]+' '+y}
async function loadAll(){const[donRes,expRes,catRes]=await Promise.all([sb.from('donations').select('*').order('date',{ascending:false}),sb.from('expenses').select('*, expense_categories(name)').order('date',{ascending:false}),sb.from('expense_categories').select('*').order('name')]);donations=donRes.data||[];expenses=expRes.data||[];categories=catRes.data||[];renderAll()}
function renderAll(){renderDashboard();renderDonations();renderExpenses();renderCategorySelect()}
function renderDashboard(){const totalDon=donations.reduce((s,d)=>s+Number(d.amount),0);const totalExp=expenses.reduce((s,e)=>s+Number(e.amount),0);const balance=totalDon-totalExp;const uniqueDonors=new Set(donations.map(d=>d.donor_name.toLowerCase())).size;document.getElementById('dashboard-stats').innerHTML='<div class="stat-card"><div class="stat-label">Total Donations</div><div class="stat-value green">'+fmt(totalDon)+'</div><div class="stat-sub">'+donations.length+' donations</div></div><div class="stat-card"><div class="stat-label">Total Expenses</div><div class="stat-value red">'+fmt(totalExp)+'</div><div class="stat-sub">'+expenses.length+' expenses</div></div><div class="stat-card"><div class="stat-label">Balance</div><div class="stat-value '+(balance>=0?'green':'red')+'">'+(balance>=0?'+':'')+fmt(balance)+'</div><div class="stat-sub">'+(balance>=0?'Surplus':'Deficit')+'</div></div><div class="stat-card"><div class="stat-label">Unique Donors</div><div class="stat-value amber">'+uniqueDonors+'</div><div class="stat-sub">supporters</div></div>';renderLeaderboard('dashboard-leaderboard',5);const recent=[...donations.map(d=>({...d,type:'donation'})),...expenses.map(e=>({...e,type:'expense'}))].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,8);document.getElementById('dashboard-recent').innerHTML='<thead><tr><th>Type</th><th>Description</th><th>Amount</th><th>Date</th></tr></thead><tbody>'+recent.map(r=>'<tr><td><span style="color:'+(r.type==='donation'?'var(--green)':'var(--red)')+';font-weight:500">'+(r.type==='donation'?'+ Donation':'- Expense')+'</span></td><td>'+(r.type==='donation'?r.donor_name:r.description)+'</td><td class="amount" style="color:'+(r.type==='donation'?'var(--green)':'var(--red)')+'">'+(r.type==='donation'?'+':'-')+fmt(r.amount)+'</td><td class="date">'+fmtDate(r.date)+'</td></tr>').join('')+'</tbody>';renderDashboardChart()}
function renderDashboardChart(){const months={};donations.forEach(d=>{const k=getMonthKey(d.date);months[k]=months[k]||{don:0,exp:0};months[k].don+=Number(d.amount)});expenses.forEach(e=>{const k=getMonthKey(e.date);months[k]=months[k]||{don:0,exp:0};months[k].exp+=Number(e.amount)});const sorted=Object.keys(months).sort().slice(-6);const ctx=document.getElementById('dashboard-chart');if(dashboardChart)dashboardChart.destroy();dashboardChart=new Chart(ctx,{type:'line',data:{labels:sorted.map(getMonthLabel),datasets:[{label:'Donations',data:sorted.map(k=>months[k].don),borderColor:'#3ECF8E',backgroundColor:'rgba(62,207,142,0.08)',fill:true,tension:.4,borderWidth:2,pointBackgroundColor:'#3ECF8E',pointRadius:3},{label:'Expenses',data:sorted.map(k=>months[k].exp),borderColor:'#f75f5f',backgroundColor:'rgba(247,95,95,0.08)',fill:true,tension:.4,borderWidth:2,pointBackgroundColor:'#f75f5f',pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12,padding:16}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>v+'€'}}}}})}
function renderLeaderboard(id,limit){const grouped={};donations.forEach(d=>{grouped[d.donor_name]=(grouped[d.donor_name]||0)+Number(d.amount)});const sorted=Object.entries(grouped).sort((a,b)=>b[1]-a[1]).slice(0,limit||999);document.getElementById(id).innerHTML=sorted.length===0?'<div class="empty-state">No donations yet</div>':sorted.map(([name,total],i)=>'<div class="leaderboard-item"><div class="lb-rank '+(i===0?'gold':i===1?'silver':i===2?'bronze':'')+'">'+( i+1)+'</div><div class="lb-name">'+name+'</div><div class="lb-amount">'+fmt(total)+'</div></div>').join('')}
function renderDonations(){document.getElementById('donations-table').innerHTML=donations.length===0?'<tbody><tr><td colspan="5"><div class="empty-state">No donations yet</div></td></tr></tbody>':'<thead><tr><th>Donor</th><th>Amount</th><th>Date</th><th>Notes</th><th>Actions</th></tr></thead><tbody>'+donations.map(d=>'<tr><td><strong>'+d.donor_name+'</strong></td><td class="amount" style="color:var(--green)">+'+fmt(d.amount)+'</td><td class="date">'+fmtDate(d.date)+'</td><td style="color:var(--text-muted)">'+(d.notes||'—')+'</td><td class="actions"><button class="btn btn-ghost btn-sm" onclick="editDonation(''+d.id+'')"\>Edit</button><button class="btn btn-danger btn-sm" onclick="deleteDonation(''+d.id+'')"\>Del</button></td></tr>').join('')+'</tbody>';renderLeaderboard('donations-leaderboard')}
document.getElementById('don-date').value=todayStr();
document.getElementById('donation-form').addEventListener('submit',async(e)=>{e.preventDefault();const{error}=await sb.from('donations').insert({donor_name:document.getElementById('don-name').value.trim(),amount:parseFloat(document.getElementById('don-amount').value),date:document.getElementById('don-date').value,notes:document.getElementById('don-notes').value.trim()||null});if(error){toast('Failed to add donation','error');return}toast('Donation added!');document.getElementById('donation-form').reset();document.getElementById('don-date').value=todayStr();await loadAll()});
async function deleteDonation(id){const d=donations.find(x=>x.id===id);openConfirm('Delete donation from <strong>'+d.donor_name+'</strong> ('+fmt(d.amount)+')?',async()=>{await sb.from('donations').delete().eq('id',id);toast('Donation deleted');await loadAll()})}
async function editDonation(id){const d=donations.find(x=>x.id===id);openModal('Edit Donation','<div class="form-row"><div class="form-group"><label>Donor Name</label><input type="text" id="edit-don-name" value="'+d.donor_name+'"/></div><div class="form-group"><label>Amount (€)</label><input type="number" id="edit-don-amount" step="0.01" value="'+d.amount+'"/></div></div><div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="edit-don-date" value="'+d.date+'"/></div><div class="form-group"><label>Notes</label><input type="text" id="edit-don-notes" value="'+(d.notes||'')+'"/></div></div>',async()=>{await sb.from('donations').update({donor_name:document.getElementById('edit-don-name').value.trim(),amount:parseFloat(document.getElementById('edit-don-amount').value),date:document.getElementById('edit-don-date').value,notes:document.getElementById('edit-don-notes').value.trim()||null}).eq('id',id);toast('Donation updated!');closeModal();await loadAll()})}
function renderCategorySelect(){document.getElementById('exp-category').innerHTML=categories.map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('')}
function renderExpenses(){document.getElementById('expenses-table').innerHTML=expenses.length===0?'<tbody><tr><td colspan="6"><div class="empty-state">No expenses yet</div></td></tr></tbody>':'<thead><tr><th>Description</th><th>Amount</th><th>Category</th><th>Date</th><th>Recurring</th><th>Actions</th></tr></thead><tbody>'+expenses.map(e=>'<tr><td><strong>'+e.description+'</strong>'+(e.notes?'<br><span style="color:var(--text-muted);font-size:.75rem">'+e.notes+'</span>':'')+'</td><td class="amount" style="color:var(--red)">-'+fmt(e.amount)+'</td><td>'+(e.expense_categories?.name||'—')+'</td><td class="date">'+fmtDate(e.date)+'</td><td>'+(e.recurring?'<span style="color:var(--amber)">Monthly</span>':'—')+'</td><td class="actions"><button class="btn btn-ghost btn-sm" onclick="editExpense(''+e.id+'')"\>Edit</button><button class="btn btn-danger btn-sm" onclick="deleteExpense(''+e.id+'')"\>Del</button></td></tr>').join('')+'</tbody>'}
document.getElementById('exp-date').value=todayStr();
document.getElementById('expense-form').addEventListener('submit',async(e)=>{e.preventDefault();const{error}=await sb.from('expenses').insert({description:document.getElementById('exp-desc').value.trim(),amount:parseFloat(document.getElementById('exp-amount').value),category_id:document.getElementById('exp-category').value,date:document.getElementById('exp-date').value,recurring:document.getElementById('exp-recurring').value==='true',notes:document.getElementById('exp-notes').value.trim()||null});if(error){toast('Failed to add expense','error');return}toast('Expense added!');document.getElementById('expense-form').reset();document.getElementById('exp-date').value=todayStr();await loadAll()});
async function deleteExpense(id){const e=expenses.find(x=>x.id===id);openConfirm('Delete expense <strong>'+e.description+'</strong> ('+fmt(e.amount)+')?',async()=>{await sb.from('expenses').delete().eq('id',id);toast('Expense deleted');await loadAll()})}
async function editExpense(id){const e=expenses.find(x=>x.id===id);const catOpts=categories.map(c=>'<option value="'+c.id+'" '+(c.id===e.category_id?'selected':'')+'>'+c.name+'</option>').join('');openModal('Edit Expense','<div class="form-row"><div class="form-group"><label>Description</label><input type="text" id="edit-exp-desc" value="'+e.description+'"/></div><div class="form-group"><label>Amount (€)</label><input type="number" id="edit-exp-amount" step="0.01" value="'+e.amount+'"/></div></div><div class="form-row"><div class="form-group"><label>Category</label><select id="edit-exp-cat">'+catOpts+'</select></div><div class="form-group"><label>Date</label><input type="date" id="edit-exp-date" value="'+e.date+'"/></div></div><div class="form-row"><div class="form-group"><label>Recurring</label><select id="edit-exp-rec"><option value="false" '+(!e.recurring?'selected':'')+'>No</option><option value="true" '+(e.recurring?'selected':'')+'>Yes</option></select></div><div class="form-group"><label>Notes</label><input type="text" id="edit-exp-notes" value="'+(e.notes||'')+'"/></div></div>',async()=>{await sb.from('expenses').update({description:document.getElementById('edit-exp-desc').value.trim(),amount:parseFloat(document.getElementById('edit-exp-amount').value),category_id:document.getElementById('edit-exp-cat').value,date:document.getElementById('edit-exp-date').value,recurring:document.getElementById('edit-exp-rec').value==='true',notes:document.getElementById('edit-exp-notes').value.trim()||null}).eq('id',id);toast('Expense updated!');closeModal();await loadAll()})}
function renderReports(){const totalDon=donations.reduce((s,d)=>s+Number(d.amount),0);const totalExp=expenses.reduce((s,e)=>s+Number(e.amount),0);const balance=totalDon-totalExp;const monthsDon={};donations.forEach(d=>{const k=getMonthKey(d.date);monthsDon[k]=(monthsDon[k]||0)+Number(d.amount)});const monthsExp={};expenses.forEach(e=>{const k=getMonthKey(e.date);monthsExp[k]=(monthsExp[k]||0)+Number(e.amount)});const avgDon=Object.keys(monthsDon).length>0?totalDon/Object.keys(monthsDon).length:0;const avgExp=Object.keys(monthsExp).length>0?totalExp/Object.keys(monthsExp).length:0;const monthlyRec=expenses.filter(e=>e.recurring).reduce((s,e)=>s+Number(e.amount),0);document.getElementById('report-stats').innerHTML='<div class="stat-card"><div class="stat-label">Avg Monthly Donations</div><div class="stat-value green">'+fmt(avgDon)+'</div></div><div class="stat-card"><div class="stat-label">Avg Monthly Expenses</div><div class="stat-value red">'+fmt(avgExp)+'</div></div><div class="stat-card"><div class="stat-label">Monthly Recurring</div><div class="stat-value amber">'+fmt(monthlyRec)+'</div></div><div class="stat-card"><div class="stat-label">Months Runway</div><div class="stat-value blue">'+(monthlyRec>0&&balance>0?(balance/monthlyRec).toFixed(1):'—')+'</div><div class="stat-sub">'+(monthlyRec>0&&balance>0?'at current costs':'set recurring expenses')+'</div></div>';const allM={};donations.forEach(d=>{const k=getMonthKey(d.date);allM[k]=allM[k]||{don:0,exp:0};allM[k].don+=Number(d.amount)});expenses.forEach(e=>{const k=getMonthKey(e.date);allM[k]=allM[k]||{don:0,exp:0};allM[k].exp+=Number(e.amount)});const sortedM=Object.keys(allM).sort().slice(-12);const barCtx=document.getElementById('report-bar-chart');if(reportBarChart)reportBarChart.destroy();reportBarChart=new Chart(barCtx,{type:'bar',data:{labels:sortedM.map(getMonthLabel),datasets:[{label:'Donations',data:sortedM.map(k=>allM[k].don),backgroundColor:'rgba(62,207,142,0.7)',borderRadius:4},{label:'Expenses',data:sortedM.map(k=>allM[k].exp),backgroundColor:'rgba(247,95,95,0.7)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{boxWidth:12}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>v+'€'}}}}});const catTotals={};expenses.forEach(e=>{const n=e.expense_categories?.name||'Other';catTotals[n]=(catTotals[n]||0)+Number(e.amount)});const pieColors=['#3ECF8E','#3b82f6','#f0b429','#f75f5f','#8b5cf6','#ec4899','#06b6d4'];const pieCtx=document.getElementById('report-pie-chart');if(reportPieChart)reportPieChart.destroy();reportPieChart=new Chart(pieCtx,{type:'doughnut',data:{labels:Object.keys(catTotals),datasets:[{data:Object.values(catTotals),backgroundColor:pieColors.slice(0,Object.keys(catTotals).length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{padding:16,boxWidth:12}}},cutout:'60%'}});document.getElementById('report-monthly-table').innerHTML='<thead><tr><th>Month</th><th>Donations</th><th>Expenses</th><th>Net</th></tr></thead><tbody>'+[...sortedM].reverse().map(k=>{const net=allM[k].don-allM[k].exp;return'<tr><td><strong>'+getMonthLabel(k)+'</strong></td><td class="amount" style="color:var(--green)">+'+fmt(allM[k].don)+'</td><td class="amount" style="color:var(--red)">-'+fmt(allM[k].exp)+'</td><td class="amount" style="color:'+(net>=0?'var(--green)':'var(--red)')+'">'+(net>=0?'+':'')+fmt(net)+'</td></tr>'}).join('')+'</tbody>'}
let modalSaveHandler=null;
function openModal(title,html,onSave){document.getElementById('modal-title').textContent=title;document.getElementById('modal-form').innerHTML=html;document.getElementById('edit-modal').classList.add('open');if(modalSaveHandler)document.getElementById('modal-save').removeEventListener('click',modalSaveHandler);modalSaveHandler=onSave;document.getElementById('modal-save').addEventListener('click',modalSaveHandler)}
function closeModal(){document.getElementById('edit-modal').classList.remove('open')}
let confirmHandler=null;
function openConfirm(text,onYes){document.getElementById('confirm-text').innerHTML=text;document.getElementById('confirm-modal').classList.add('open');if(confirmHandler)document.getElementById('confirm-yes').removeEventListener('click',confirmHandler);confirmHandler=async()=>{await onYes();closeConfirm()};document.getElementById('confirm-yes').addEventListener('click',confirmHandler)}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open')}
document.getElementById('edit-modal').addEventListener('click',(e)=>{if(e.target===e.currentTarget)closeModal()});
document.getElementById('confirm-modal').addEventListener('click',(e)=>{if(e.target===e.currentTarget)closeConfirm()});
loadAll();
<\/script>
</body>
</html>
